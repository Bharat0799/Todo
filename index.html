<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h1 class="app-title">Smart Task Manager</h1>
            <div class="header-right">
                <div class="theme-switcher">
                    <input type="checkbox" id="theme-toggle">
                    <label for="theme-toggle" class="slider"></label>
                </div>
                <img src="https://i.pravatar.cc/40" alt="User Avatar" class="user-avatar">
            </div>
        </header>

        <main class="app-main">
            <div class="task-creation-panel">
                <h2>Create a New Task</h2>
                <form id="task-form">
                    <input type="text" id="task-title" placeholder="Task title..." required>
                    <div class="task-meta">
                        <input type="date" id="task-due-date">
                        <select id="task-priority">
                            <option value="low">Low Priority</option>
                            <option value="medium">Medium Priority</option>
                            <option value="high">High Priority</option>
                        </select>
                        <select id="task-category">
                            <option value="study">Study</option>
                            <option value="work">Work</option>
                            <option value="personal">Personal</option>
                            <option value="projects">Projects</option>
                        </select>
                    </div>
                    <button type="submit" class="glowing-btn">Add Task</button>
                </form>
            </div>

            <div class="task-controls">
                <input type="text" id="search-bar" placeholder="Search tasks...">
                <div class="filter-tabs">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="pending">Pending</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                    <button class="filter-btn" data-filter="high-priority">High Priority</button>
                    <button class="filter-btn" data-filter="due-today">Due Today</button>
                </div>
            </div>

            <div class="task-list-container">
                <ul id="task-list">
                    <!-- Tasks will be injected here by JavaScript -->
                </ul>
            </div>

            <div class="progress-section">
                <h2>Progress</h2>
                <p id="progress-text">0 / 0 tasks completed</p>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
