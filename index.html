<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Smart Task Manager</h1>
            <button id="theme-toggle"><i class="fa-solid fa-moon"></i></button>
        </header>

        <section class="add-task-section">
            <form id="add-task-form">
                <input type="text" id="task-title" placeholder="Enter a new task..." required>
                <input type="date" id="task-due-date">
                <select id="task-priority">
                    <option value="high">High</option>
                    <option value="medium" selected>Medium</option>
                    <option value="low">Low</option>
                </select>
                <button type="submit">Add Task</button>
            </form>
        </section>

        <section class="controls-section">
            <div class="search-container">
                <input type="text" id="search-bar" placeholder="Search tasks...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
                <button class="filter-btn" data-filter="high">High Priority</button>
            </div>
        </section>

        <section class="task-list-section">
            <ul id="task-list">
                <!-- Tasks will be dynamically inserted here -->
            </ul>
        </section>

        <section class="progress-section">
            <div class="progress-summary">
                <p>Progress</p>
                <p id="progress-text">0 / 0 tasks completed</p>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </section>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/confetti-js@0.0.18/dist/index.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
